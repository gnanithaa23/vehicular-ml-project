{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>An Ensemble Deep Learning Model for Vehicular Engine Health Prediction</title>
  <link href="{% static 'style.css' %}" rel="stylesheet" type="text/css" />
  <script language="javascript">
    function validate(formObj) {
      if(formObj.t1.value.length==0) {
        alert("Please Enter Username");
        formObj.t1.focus();
        return false;
      }
      if(formObj.t2.value.length==0) {
        alert("Please Enter Password");
        formObj.t2.focus();
        return false;
      }
      formObj.actionUpdateData.value="update";
      return true;
    }
  </script>
  <script language="javascript" type="text/javascript" src="datetimepicker.js"></script>
</head>

<!-- Apply full background image -->
<body style="
  background: url('{% static 'images/background.jpg' %}') no-repeat center center fixed;
  background-size: cover;
  margin: 0;
  padding: 0;
">

  <!-- Stylish padded container -->
  <div class="main" style="
    background-color: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 15px;
    max-width: 1100px;
    margin: 40px auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  ">

    <div class="main_resize">

      <!-- Header -->
      <div class="header" style="text-align: center;">
        <div class="logo">
          <h1><span>An Ensemble Deep Learning Model for Vehicular Engine Health Prediction</span></h1>
        </div>
      </div>

      <!-- Navigation -->
      <div class="menu_nav" style="text-align: center; margin-bottom: 20px;">
        <ul style="display: inline-block; list-style: none; padding: 0;">
          <li style="display: inline; margin: 0 15px;"><a href="{% url 'index' %}">Home</a></li>
          <li style="display: inline; margin: 0 15px;"><a href="{% url 'UserLogin' %}">User Login</a></li>
          <li style="display: inline; margin: 0 15px;"><a href="{% url 'Signup' %}">New User Signup Here</a></li>
        </ul>
      </div>

      <!-- Header image -->
      <div class="hbg" style="text-align: center; margin-bottom: 20px;">
        <img src="{% static 'images/header_images.png' %}" width="915" height="286" alt="Header Image" style="max-width: 100%; border-radius: 10px;">
      </div>

      <!-- Login Form -->
      <form name="f1" method="post" action="{% url 'UserLoginAction' %}" onsubmit="return validate(this);" style="text-align: center;">
        {% csrf_token %}
        <h2><b>User Login Screen</b></h2>

        <div style="color: red; font-weight: bold;">{{ data }}</div><br/>

        <table align="center" style="margin: 0 auto; font-family: Comic Sans MS;">
          <tr>
            <td align="right" style="padding: 10px;"><label for="t1">Username</label></td>
            <td><input type="text" name="t1" size="30" style="padding: 5px;"></td>
          </tr>
          <tr>
            <td align="right" style="padding: 10px;"><label for="t2">Password</label></td>
            <td><input type="password" name="t2" size="30" style="padding: 5px;"></td>
          </tr>
          <tr>
            <td></td>
            <td style="padding: 10px;"><input type="submit" value="Login" style="padding: 5px 15px;"></td>
          </tr>
        </table>
      </form>

    </div>
  </div>

</body>
</html>
